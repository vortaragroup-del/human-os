<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Human OS • Real SaaS App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
min-height:100vh;
}

.sidebar{
width:240px;
background:#111827;
padding:22px;
border-right:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:24px;
}

.menu a{
display:block;
padding:12px;
margin-bottom:8px;
border-radius:12px;
text-decoration:none;
color:white;
background:#1e293b;
}

.main{
flex:1;
padding:24px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:18px;
margin-bottom:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

.big{
font-size:34px;
font-weight:bold;
margin-top:8px;
}

input,textarea{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px;
background:#334155;
color:white;
}

button{
padding:12px 16px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
width:100%;
}

.task{
background:#334155;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.chat{
max-height:220px;
overflow-y:auto;
}

.small{
opacity:.75;
font-size:14px;
margin-top:8px;
}

@media(max-width:900px){
body{
display:block;
}
.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid rgba(255,255,255,.08);
}
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🚀 Human OS</div>

<div class="menu">
<a href="#">Dashboard</a>
<a href="#">Tasks</a>
<a href="#">Goals</a>
<a href="#">Habits</a>
<a href="#">AI Coach</a>
<a href="#">Billing</a>
<a href="#">Settings</a>
</div>
</div>

<div class="main">

<div class="topbar">
<h1>Welcome Back</h1>
<div>Pro Plan 👑</div>
</div>

<div class="grid">

<div class="card">
<h3>Focus Hours</h3>
<div class="big">28h</div>
<p class="small">This Week</p>
</div>

<div class="card">
<h3>Tasks Done</h3>
<div class="big">16</div>
<p class="small">Last 7 Days</p>
</div>

<div class="card">
<h3>Habit Streak</h3>
<div class="big">21</div>
<p class="small">Days</p>
</div>

<div class="card">
<h3>Revenue Goal</h3>
<div class="big">$4,200</div>
<p class="small">Monthly</p>
</div>

</div>

<div class="card">
<h2>🎯 Daily Mission</h2>
<input id="goal" placeholder="Enter today’s main target">
<button onclick="saveGoal()">Save Mission</button>
<p class="small" id="goalText"></p>
</div>

<div class="card">
<h2>✅ Task Manager</h2>
<input id="taskInput" placeholder="Add a task">
<button onclick="addTask()">Add Task</button>
<div id="tasks"></div>
</div>

<div class="card">
<h2>🤖 AI Coach</h2>
<input id="chatInput" placeholder="Ask for guidance">
<button onclick="coach()">Send</button>
<div class="chat" id="chatBox"></div>
</div>

<div class="card">
<h2>🧠 Notes Vault</h2>
<textarea id="notes" rows="4" placeholder="Store ideas and plans"></textarea>
<button onclick="saveNotes()">Save Notes</button>
<p class="small" id="saved"></p>
</div>

<div class="card">
<h2>💳 Upgrade Billing</h2>
<button onclick="alert('Stripe checkout connect next')">Upgrade to Elite</button>
</div>

</div>

<script>
function saveGoal(){
let g=document.getElementById("goal").value;
localStorage.setItem("goal",g);
document.getElementById("goalText").innerText="Mission Locked: "+g;
}
document.getElementById("goalText").innerText=
localStorage.getItem("goal")?"Mission Locked: "+localStorage.getItem("goal"):"";

function addTask(){
let t=document.getElementById("taskInput").value;
if(t=="") return;
let div=document.createElement("div");
div.className="task";
div.innerHTML=t;
document.getElementById("tasks").appendChild(div);
document.getElementById("taskInput").value="";
}

function saveNotes(){
localStorage.setItem("notes",document.getElementById("notes").value);
document.getElementById("saved").innerText="Saved";
}
document.getElementById("notes").value=
localStorage.getItem("notes")||"";

function coach(){
let q=document.getElementById("chatInput").value;
if(q=="") return;

let box=document.getElementById("chatBox");

let user=document.createElement("div");
user.className="task";
user.innerText="You: "+q;
box.appendChild(user);

let ai=document.createElement("div");
ai.className="task";

let replies=[
"Focus on the highest leverage move first.",
"Reduce noise and execute one mission.",
"Systems beat motivation every time.",
"Discipline creates freedom.",
"Move now. Improve later."
];

ai.innerText="AI: "+replies[Math.floor(Math.random()*replies.length)];
box.appendChild(ai);

document.getElementById("chatInput").value="";
box.scrollTop=box.scrollHeight;
}
</script>

</body>
 </html>
