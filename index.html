
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Human OS v2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:20px;
transition:0.3s;
}

.light{
background:#f1f5f9;
color:#111827;
}

.container{
max-width:520px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:18px;
margin-bottom:16px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.light .card{
background:white;
}

h1{
font-size:34px;
margin-bottom:8px;
}

h2{
font-size:22px;
margin-bottom:10px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#334155;
color:white;
}

.light input,.light textarea{
background:#e5e7eb;
color:black;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.task{
padding:10px;
background:#334155;
margin-top:8px;
border-radius:10px;
}

.light .task{
background:#e5e7eb;
color:black;
}

.small{
font-size:14px;
opacity:.8;
margin-top:10px;
}

.row{
display:flex;
gap:10px;
}

.row button{
flex:1;
}

.chatbox{
max-height:250px;
overflow-y:auto;
margin-top:10px;
}

.msg{
padding:10px;
border-radius:10px;
margin-top:8px;
background:#334155;
}

.light .msg{
background:#e5e7eb;
color:black;
}
</style>
</head>

<body id="body">

<div class="container">

<div class="card">
<h1>🚀 Human OS v2</h1>
<p>Your Smart Productivity System</p>
<div class="row">
<button onclick="toggleMode()">🌙 Toggle Mode</button>
<button onclick="logout()">🔒 Logout</button>
</div>
</div>

<div class="card" id="loginCard">
<h2>🔐 Login</h2>
<input id="username" placeholder="Enter Username">
<button onclick="login()">Login</button>
<p class="small" id="userStatus"></p>
</div>

<div id="app" style="display:none;">

<div class="card">
<h2>🎯 Daily Goal</h2>
<input id="goal" placeholder="Today's Goal">
<button onclick="saveGoal()">Save Goal</button>
<p class="small" id="goalText"></p>
</div>

<div class="card">
<h2>✅ Tasks</h2>
<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add Task</button>
<div id="tasks"></div>
</div>

<div class="card">
<h2>📅 Habit Tracker</h2>
<div class="row">
<button onclick="habit('Workout')">Workout</button>
<button onclick="habit('Read')">Read</button>
<button onclick="habit('Meditate')">Meditate</button>
</div>
<p class="small" id="habitText"></p>
</div>

<div class="card">
<h2>🧠 Notes</h2>
<textarea id="note" rows="4" placeholder="Write notes..."></textarea>
<button onclick="saveNote()">Save Notes</button>
<p class="small" id="saved"></p>
</div>

<div class="card">
<h2>🤖 AI Chat</h2>
<input id="chatInput" placeholder="Ask AI anything...">
<button onclick="chat()">Send</button>
<div class="chatbox" id="chatbox"></div>
</div>

</div>

</div>

<script>
function login(){
let user=document.getElementById("username").value;
if(user=="") return;
localStorage.setItem("user",user);
showApp();
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

function showApp(){
let user=localStorage.getItem("user");
if(user){
document.getElementById("loginCard").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("userStatus").innerText="Welcome "+user;
}
}
showApp();

function saveGoal(){
let goal=document.getElementById("goal").value;
localStorage.setItem("goal",goal);
document.getElementById("goalText").innerText="Goal: "+goal;
}
document.getElementById("goalText").innerText=
localStorage.getItem("goal")?"Goal: "+localStorage.getItem("goal"):"";

function addTask(){
let val=document.getElementById("taskInput").value;
if(val=="") return;
let div=document.createElement("div");
div.className="task";
div.innerText=val;
document.getElementById("tasks").appendChild(div);
document.getElementById("taskInput").value="";
}

function saveNote(){
let note=document.getElementById("note").value;
localStorage.setItem("note",note);
document.getElementById("saved").innerText="Saved";
}
document.getElementById("note").value=localStorage.getItem("note")||"";

function habit(name){
document.getElementById("habitText").innerText=name+" completed today ✅";
}

function toggleMode(){
document.getElementById("body").classList.toggle("light");
}

function chat(){
let input=document.getElementById("chatInput").value;
if(input=="") return;

let box=document.getElementById("chatbox");

let user=document.createElement("div");
user.className="msg";
user.innerText="You: "+input;
box.appendChild(user);

let ai=document.createElement("div");
ai.className="msg";

let replies=[
"Stay focused and execute.",
"Break it into smaller steps.",
"You are capable of more.",
"Consistency beats intensity.",
"Take action now."
];

ai.innerText="AI: "+replies[Math.floor(Math.random()*replies.length)];
box.appendChild(ai);

document.getElementById("chatInput").value="";
box.scrollTop=box.scrollHeight;
}
</script>

</body>
            </html>
